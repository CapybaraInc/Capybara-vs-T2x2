<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Капибара-раннер: Полиция, KFC и T-2 X-2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Comic Sans MS', 'Arial', sans-serif;
      padding: 10px;
      margin: 0;
    }
    .game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
      border-radius: 30px;
      overflow: hidden;
      background: #0f3460;
      border: 4px solid #e94560;
    }
    canvas {
      display: block;
      width: 100%;
      max-width: 800px;
      height: auto;
      background: radial-gradient(circle at 20% 30%, #ffb703, #fb8500);
      border-bottom: 6px solid #533e2d;
    }
    .info-panel {
      width: 100%;
      background: #1a1a2e;
      color: white;
      display: flex;
      justify-content: space-between;
      padding: 12px 25px;
      font-size: 1.3rem;
      font-weight: bold;
      text-shadow: 2px 2px 0 #000;
      background-image: repeating-linear-gradient(45deg, #e94560 0px, #e94560 15px, #0f3460 15px, #0f3460 30px);
      border-top: 4px solid #f5c542;
    }
    .score {
      background: black;
      padding: 5px 20px;
      border-radius: 30px;
      color: #f5c542;
      letter-spacing: 1px;
    }
    button {
      background: #e94560;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 8px 25px;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 5px 0 #7a192a;
      transition: 0.1s ease;
      border: 2px solid #ffb703;
      letter-spacing: 1px;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #7a192a;
    }
    .controls {
      color: #ddd;
      font-size: 0.9rem;
      align-self: center;
      background: rgba(0,0,0,0.6);
      padding: 5px 15px;
      border-radius: 20px;
    }
    @media (max-width: 600px) {
      .info-panel {
        font-size: 1rem;
        padding: 8px 15px;
      }
    }
  </style>
</head>
<body>
<div style="display: flex; flex-direction: column; align-items: center;">
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="400" aria-label="Игра Капибара против полиции и T-2 X-2"></canvas>
    <div class="info-panel">
      <span>🍗 KFC <span id="scoreDisplay">0</span></span>
      <span class="controls">ПРОБЕЛ / КЛИК</span>
      <span>❤️ <span id="healthDisplay">3</span></span>
      <button id="restartButton">🔄 ЗАНОВО</button>
    </div>
  </div>
  <div style="color:#ccc; margin-top:8px; font-size:0.9rem; text-align:center;">
    🚓 Полиция сзади! Уворачивайся от мемов (бургеры KFC, баяны). <br> 
    ⚡ Босс T-2 X-2: "Эй ты, капибара, я сделал из тебя крылышки KFC!" Кидайся ранцами!
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Элементы интерфейса
    const scoreSpan = document.getElementById('scoreDisplay');
    const healthSpan = document.getElementById('healthDisplay');

    // Размеры
    const GROUND_Y = 340;  // Уровень дороги
    let gameOver = false;
    let gameWin = false;
    let score = 0;
    let health = 3;

    // Игрок (капибара в инвалидной коляске)
    const player = {
      x: 150,
      y: GROUND_Y - 55, // высота коляски + капибара
      width: 60,
      height: 55,
      vy: 0,
      gravity: 0.7,
      jumpPower: -10,
      grounded: true
    };

    // Препятствия (мемы: бургеры KFC, баяны/ранцы в воздухе и на земле)
    let obstacles = [];

    // Снаряды игрока (ранцы) для атаки босса
    let backpacks = [];

    // Босс T-2 X-2
    let boss = null;
    let bossActive = false;
    let bossDefeated = false;
    let bossHealth = 5;
    const BOSS_SPAWN_SCORE = 15; // После 15 очков появляется босс

    // Таймеры для генерации препятствий
    let frameCounter = 0;
    let spawnGap = 70; // интервал между препятствиями

    // Полицейская мигалка на фоне
    let policeLights = 0;

    // Управление
    let keys = {};
    let jumpRequested = false;

    // Сброс игры
    function restartGame() {
      gameOver = false;
      gameWin = false;
      score = 0;
      health = 3;
      player.y = GROUND_Y - 55;
      player.vy = 0;
      player.grounded = true;
      obstacles = [];
      backpacks = [];
      boss = null;
      bossActive = false;
      bossDefeated = false;
      bossHealth = 5;
      frameCounter = 0;
      spawnGap = 70;
      updateUI();
    }

    // Обновление текста
    function updateUI() {
      scoreSpan.textContent = score;
      healthSpan.textContent = health;
    }

    // Обработка ввода
    function handleJump() {
      if (gameOver || gameWin) return;
      // Прыжок только если на земле
      if (player.y >= GROUND_Y - player.height - 2) {
        player.vy = player.jumpPower;
        player.grounded = false;
      }
    }

    // Атака ранцем (стрельба)
    function shootBackpack() {
      if (gameOver || gameWin) return;
      if (!bossActive || bossDefeated) return; // стреляем только в босса
      // Создаём ранец, летящий вправо
      backpacks.push({
        x: player.x + 40,
        y: player.y + 15,
        width: 22,
        height: 18,
        speed: 7,
        active: true
      });
    }

    // Клавиши
    window.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Space' || e.code === 'Space') {
        e.preventDefault();
        handleJump();
      }
      if (e.key === 'f' || e.key === 'F' || e.key === 'Control' || e.key === 'Shift') {
        e.preventDefault();
        shootBackpack();
      }
    });

    // Клик/тап по канвасу
    canvas.addEventListener('click', (e) => {
      e.preventDefault();
      handleJump();
    });

    // Правый клик или долгий тап для стрельбы (мобильная альтернатива)
    canvas.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      shootBackpack();
    });

    // Генерация препятствий (мемы)
    function spawnObstacle() {
      if (gameOver || gameWin || bossActive) return; // во время битвы с боссом обычные препятствия не спавним

      const type = Math.random();
      let obs = {
        x: canvas.width + 20,
        width: 35,
        height: 35,
        type: 'burger', // бургер KFC
        speed: 5.5 + Math.floor(score/8),
      };

      if (type < 0.6) {
        // Наземное препятствие: бургер или баян (мем)
        obs.y = GROUND_Y - 35;
        obs.type = Math.random() < 0.7 ? 'burger' : 'bayan';
      } else {
        // Воздушное препятствие (летящий ранец/мем сверху) - нужно подпрыгивать или уклоняться
        obs.y = GROUND_Y - 90 - Math.random() * 40;
        obs.type = 'flying_meme';
        obs.width = 40;
        obs.height = 30;
      }
      obstacles.push(obs);
    }

    // Спавн босса T-2 X-2
    function spawnBoss() {
      if (bossActive || bossDefeated || gameOver || gameWin) return;
      // Очищаем препятствия перед битвой
      obstacles = [];
      bossActive = true;
      bossHealth = 5;
      boss = {
        x: canvas.width - 150,
        y: GROUND_Y - 110,
        width: 80,
        height: 90,
        attackTimer: 0,
        attackCooldown: 45,
        phraseTimer: 0,
      };
    }

    // Босс атакует (кидается бургерами KFC)
    function bossAttack() {
      if (!bossActive || bossDefeated || gameOver || gameWin) return;
      obstacles.push({
        x: boss.x - 20,
        y: boss.y + 50,
        width: 32,
        height: 32,
        type: 'boss_burger',
        speed: -6, // летит влево в игрока
        isBossProjectile: true
      });
    }

    // Проверка столкновений (AABB)
    function rectCollide(r1, r2) {
      return !(r2.x > r1.x + r1.width ||
        r2.x + r2.width < r1.x ||
        r2.y > r1.y + r1.height ||
        r2.y + r2.height < r1.y);
    }

    // Обновление логики
    function update() {
      if (gameOver || gameWin) return;

      // Физика игрока
      player.vy += player.gravity;
      player.y += player.vy;

      // Земля
      if (player.y >= GROUND_Y - player.height) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.grounded = true;
      } else {
        player.grounded = false;
      }

      // Границы мира
      if (player.y < 50) player.y = 50;

      // Движение препятствий
      for (let obs of obstacles) {
        obs.x -= obs.speed || 5.5;
      }

      // Удаление препятствий за экраном
      obstacles = obstacles.filter(obs => obs.x > -80);

      // Движение ранцев игрока
      for (let bp of backpacks) {
        bp.x += bp.speed;
      }
      backpacks = backpacks.filter(bp => bp.x < canvas.width + 30 && bp.active);

      // Столкновения игрока с препятствиями
      for (let obs of obstacles) {
        if (rectCollide(
          {x: player.x, y: player.y, width: player.width, height: player.height},
          {x: obs.x, y: obs.y, width: obs.width, height: obs.height}
        )) {
          // Попадание
          if (!obs.hit) {
            obs.hit = true;
            health--;
            updateUI();
            // Небольшая анимация отбрасывания? просто удалим препятствие
            obstacles = obstacles.filter(o => o !== obs);
            if (health <= 0) {
              gameOver = true;
              health = 0;
              updateUI();
              return;
            }
          }
        }
      }

      // Попадания ранцев по боссу
      if (bossActive && boss && !bossDefeated) {
        for (let bp of backpacks) {
          if (rectCollide(
            {x: bp.x, y: bp.y, width: bp.width, height: bp.height},
            {x: boss.x, y: boss.y, width: boss.width, height: boss.height}
          )) {
            bp.active = false;
            bossHealth--;
            if (bossHealth <= 0) {
              bossDefeated = true;
              bossActive = false;
              score += 10;
              updateUI();
              // Победа над боссом, но игра продолжается!
              backpacks = [];
              obstacles = []; // убираем снаряды босса
            }
          }
        }
        // Удаляем неактивные ранцы
        backpacks = backpacks.filter(bp => bp.active);

        // Таймер атаки босса
        if (boss && bossActive) {
          boss.attackTimer++;
          if (boss.attackTimer >= boss.attackCooldown) {
            bossAttack();
            boss.attackTimer = 0;
          }
          boss.phraseTimer++;
        }
      }

      // Если босс побеждён, возвращаемся к обычному спавну
      if (bossDefeated) {
        boss = null;
        // продолжаем игру
      }

      // Генерация обычных препятствий (если нет босса)
      if (!bossActive && !gameOver && !gameWin) {
        frameCounter++;
        let dynamicGap = Math.max(35, spawnGap - Math.floor(score / 3));
        if (frameCounter >= dynamicGap) {
          spawnObstacle();
          frameCounter = 0;
          // Редкий воздушный мем дополнительно
        }
      }

      // Проверка условия появления босса по очкам
      if (!bossActive && !bossDefeated && !gameOver && !gameWin && score >= BOSS_SPAWN_SCORE && boss === null) {
        spawnBoss();
      }

      // Увеличение счета за выживание
      if (!gameOver && !gameWin && !bossActive) {
        // Каждые 40 кадров +1 очко (приблизительно)
        if (frameCounter % 35 === 0 && frameCounter !== 0) {
          score++;
          updateUI();
        }
      }

      // Победа, если набрали много очков после босса (например 30)
      if (!gameWin && !gameOver && score >= 30 && bossDefeated) {
        gameWin = true;
      }

      updateUI();
    }

    // Отрисовка
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Небо и дорога
      ctx.fillStyle = '#f4a261';
      ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
      // Асфальт
      ctx.fillStyle = '#2d2d2d';
      ctx.fillRect(0, GROUND_Y-5, canvas.width, 12);
      // Разметка
      ctx.fillStyle = '#f5e56c';
      for (let i = 0; i < 15; i++) {
        let x = (i * 70 + frameCounter * 4) % 800;
        ctx.fillRect(x, GROUND_Y-2, 35, 6);
      }

      // Полицейские мигалки сзади (эффект)
      policeLights += 0.2;
      let alpha = Math.sin(policeLights) * 0.3 + 0.4;
      ctx.fillStyle = `rgba(255, 0, 0, ${alpha})`;
      ctx.fillRect(0, 0, canvas.width, 15);
      ctx.fillStyle = `rgba(0, 0, 255, ${alpha*0.8})`;
      ctx.fillRect(0, 15, canvas.width, 10);

      // Рисуем препятствия (мемы)
      for (let obs of obstacles) {
        if (obs.type === 'burger' || obs.type === 'boss_burger') {
          // Бургер KFC
          ctx.fillStyle = '#d4a373';
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height-8);
          ctx.fillStyle = '#f4a261';
          ctx.fillRect(obs.x-2, obs.y-4, obs.width+4, 8);
          ctx.fillStyle = '#e9c46a';
          ctx.fillRect(obs.x+4, obs.y-8, obs.width-8, 6);
          // семечки
          ctx.fillStyle = 'white';
          for (let s=0; s<4; s++) {
            ctx.beginPath();
            ctx.arc(obs.x+8+s*7, obs.y+10, 2.5, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.fillStyle = '#bc6c25';
          ctx.font = 'bold 14px "Comic Sans MS"';
          ctx.fillText('KFC', obs.x+2, obs.y+22);
        } else if (obs.type === 'bayan') {
          // Баян (мем)
          ctx.fillStyle = '#8B4513';
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height-5);
          ctx.fillStyle = '#D2B48C';
          for (let b=0; b<5; b++) {
            ctx.fillRect(obs.x+4, obs.y+5+b*5, obs.width-8, 3);
          }
          ctx.fillStyle = 'black';
          ctx.font = '10px Arial';
          ctx.fillText('БАЯН', obs.x, obs.y-4);
        } else if (obs.type === 'flying_meme') {
          // Летающий ранец / мем
          ctx.fillStyle = '#6b705c';
          ctx.fillRect(obs.x, obs.y, obs.width, obs.height-5);
          ctx.fillStyle = '#b7b7a4';
          ctx.fillRect(obs.x-3, obs.y-3, obs.width+6, 8);
          ctx.fillStyle = '#283618';
          ctx.font = 'bold 13px "Comic Sans MS"';
          ctx.fillText('РЮКЗАК', obs.x-5, obs.y-6);
        }
      }

      // Ранцы игрока (снаряды)
      for (let bp of backpacks) {
        ctx.fillStyle = '#2a9d8f';
        ctx.fillRect(bp.x, bp.y, bp.width, bp.height);
        ctx.fillStyle = '#e9c46a';
        ctx.fillRect(bp.x+4, bp.y-2, 14, 6);
        ctx.fillStyle = 'white';
        ctx.font = 'bold 11px Arial';
        ctx.fillText('🎒', bp.x, bp.y+14);
      }

      // Босс T-2 X-2
      if (bossActive && boss && !bossDefeated) {
        drawBoss(boss);
        // Фраза босса
        if (boss.phraseTimer < 120) {
          ctx.fillStyle = 'white';
          ctx.font = 'bold 17px "Comic Sans MS"';
          ctx.shadowColor = 'black';
          ctx.shadowBlur = 6;
          ctx.fillText('🗣️ "Эй ты, капибара, я сделал', boss.x-100, boss.y-30);
          ctx.fillText('из тебя крылышки KFC!"', boss.x-80, boss.y-8);
          ctx.shadowBlur = 0;
          ctx.shadowColor = 'transparent';
        }
      }

      // Игрок (капибара в инвалидной коляске)
      drawCapybara(player.x, player.y);

      // Сообщения игры
      if (gameOver) {
        ctx.globalAlpha = 0.8;
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#e94560';
        ctx.font = '38px "Comic Sans MS"';
        ctx.fillText('💀 КАПИБАРА ПАЛА', 150, 200);
      } else if (gameWin) {
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = '#f5c542';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#16213e';
        ctx.font = '34px "Comic Sans MS"';
        ctx.fillText('🏆 ПОБЕДА! T-2 X-2', 150, 180);
        ctx.fillText('ПОВЕРЖЕН!', 250, 230);
      }
    }

    function drawCapybara(x, y) {
      // Коляска инвалидная
      ctx.fillStyle = '#4a4e69';
      ctx.fillRect(x+5, y+32, 50, 20);
      ctx.fillStyle = '#22223b';
      ctx.fillRect(x, y+48, 60, 10);
      // Колеса
      ctx.fillStyle = '#1f1f1f';
      ctx.beginPath();
      ctx.arc(x+12, y+58, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+48, y+58, 8, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#f5e56c';
      ctx.beginPath();
      ctx.arc(x+12, y+58, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+48, y+58, 4, 0, Math.PI*2);
      ctx.fill();

      // Капибара
      ctx.fillStyle = '#b5838d';
      ctx.fillRect(x+8, y+15, 40, 25);
      ctx.fillStyle = '#6d4c41';
      ctx.fillRect(x+10, y+5, 35, 18);
      // Уши
      ctx.fillStyle = '#5d4037';
      ctx.beginPath();
      ctx.arc(x+15, y+3, 6, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+40, y+3, 6, 0, Math.PI);
      ctx.fill();
      // Морда
      ctx.fillStyle = '#d4a373';
      ctx.fillRect(x+14, y+22, 28, 10);
      ctx.fillStyle = 'black';
      ctx.beginPath();
      ctx.arc(x+22, y+25, 2.5, 0, Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x+34, y+25, 2.5, 0, Math.PI);
      ctx.fill();
      ctx.fillStyle = '#3e2723';
      ctx.beginPath();
      ctx.arc(x+28, y+29, 2, 0, Math.PI*2);
      ctx.fill();
    }

    function drawBoss(b) {
      // T-2 X-2 в стиле терминатора + KFC
      ctx.fillStyle = '#2b2b2b';
      ctx.fillRect(b.x, b.y, b.width, b.height-10);
      ctx.fillStyle = '#bc4742';
      ctx.fillRect(b.x+10, b.y-10, 60, 20);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 14px Arial';
      ctx.fillText('T-2 X-2', b.x+5, b.y+20);
      ctx.fillStyle = '#f4a261';
      ctx.fillRect(b.x+8, b.y+55, 25, 20);
      ctx.fillText('🍗', b.x+30, b.y+70);
      // полоска здоровья
      ctx.fillStyle = 'red';
      ctx.fillRect(b.x, b.y-18, 80, 8);
      ctx.fillStyle = '#00ff00';
      ctx.fillRect(b.x, b.y-18, (bossHealth/5)*80, 8);
    }

    // Игровой цикл
    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Кнопка рестарт
    document.getElementById('restartButton').addEventListener('click', restartGame);

    // Запуск
    restartGame();
    gameLoop();
  })();
</script>
</body>
</html>
