<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capybara vs T-2 X-2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            padding: 10px;
        }
        .game-wrapper {
            max-width: 480px;
            width: 100%;
            background: #1a1a2e;
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 2px solid #ff00ff;
        }
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 9 / 16;
            background: #0d1117;
            border-radius: 16px;
        }
        .ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            padding: 10px 5px 0;
            font-weight: bold;
        }
        .ui .score {
            color: #ffcc00;
        }
        .ui .health {
            color: #ff6666;
        }
        .btn {
            background: #ff00ff;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .msg {
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div class="ui">
            <span class="score">🍊 <span id="scoreDisplay">0</span></span>
            <span class="health">❤️ <span id="healthDisplay">3</span></span>
            <button class="btn" id="restartBtn">↺</button>
        </div>
        <div class="msg" id="msgDisplay">Беги и собирай апельсинки!</div>
    </div>
    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const healthDisplay = document.getElementById('healthDisplay');
            const msgDisplay = document.getElementById('msgDisplay');
            const restartBtn = document.getElementById('restartBtn');

            const W = canvas.width;
            const H = canvas.height;

            function resize() {
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * (window.devicePixelRatio || 1);
                canvas.height = rect.height * (window.devicePixelRatio || 1);
                ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
            }
            resize();
            window.addEventListener('resize', resize);

            // Игровые переменные
            let score = 0;
            let health = 3;
            let gameOver = false;
            let gameWin = false;
            let bossActive = false;
            let bossDefeated = false;
            let bossHealth = 5;
            let bossSpawned = false;
            let frame = 0;
            let speed = 4;

            const GROUND = H - 60;

            let player = {
                x: 50,
                y: GROUND - 40,
                w: 30,
                h: 40,
                vy: 0,
                grounded: true
            };

            let obstacles = [];
            let coins = [];
            let backpacks = [];
            let boss = null;

            function reset() {
                score = 0;
                health = 3;
                gameOver = false;
                gameWin = false;
                bossActive = false;
                bossDefeated = false;
                bossHealth = 5;
                bossSpawned = false;
                frame = 0;
                speed = 4;
                player.y = GROUND - 40;
                player.vy = 0;
                player.grounded = true;
                obstacles = [];
                coins = [];
                backpacks = [];
                boss = null;
                msgDisplay.textContent = 'Беги и собирай апельсинки!';
                updateUI();
            }

            function updateUI() {
                scoreDisplay.textContent = score;
                healthDisplay.textContent = health;
            }

            function jump() {
                if (gameOver || gameWin) return;
                if (player.grounded) {
                    player.vy = -7;
                    player.grounded = false;
                }
            }

            function shoot() {
                if (gameOver || gameWin) return;
                if (!bossActive || bossDefeated) return;
                backpacks.push({
                    x: player.x + 20,
                    y: player.y + 10,
                    w: 15,
                    h: 12,
                    vx: 6
                });
            }

            function spawnCoin() {
                coins.push({
                    x: W + 20,
                    y: 100 + Math.random() * (GROUND - 150),
                    w: 12,
                    h: 12,
                    collected: false
                });
            }

            function spawnObstacle() {
                let y = GROUND - 30;
                if (Math.random() < 0.3) y = 80 + Math.random() * 100;
                obstacles.push({
                    x: W + 20,
                    y: y,
                    w: 20,
                    h: 20,
                    type: Math.random() < 0.5 ? 'burger' : 'bayan'
                });
            }

            function spawnBoss() {
                boss = {
                    x: W - 80,
                    y: 100,
                    w: 60,
                    h: 70,
                    attackTimer: 0,
                    cooldown: 40
                };
                bossActive = true;
                bossSpawned = true;
                msgDisplay.textContent = '⚡ Босс T-2 X-2 появился!';
                obstacles = [];
            }

            function bossAttack() {
                if (!bossActive || bossDefeated) return;
                obstacles.push({
                    x: boss.x - 20,
                    y: boss.y + 30,
                    w: 20,
                    h: 20,
                    vx: -5,
                    isBoss: true
                });
            }

            function update() {
                if (gameOver || gameWin) return;
                frame++;

                // Физика игрока
                player.vy += 0.5;
                player.y += player.vy;
                if (player.y >= GROUND - player.h) {
                    player.y = GROUND - player.h;
                    player.vy = 0;
                    player.grounded = true;
                }

                // Монеты
                for (let c of coins) {
                    c.x -= speed;
                    if (!c.collected) {
                        if (player.x + player.w > c.x && player.x < c.x + c.w &&
                            player.y + player.h > c.y && player.y < c.y + c.h) {
                            c.collected = true;
                            score += 5;
                            updateUI();
                        }
                    }
                }
                coins = coins.filter(c => !c.collected && c.x > -20);

                // Препятствия
                for (let o of obstacles) {
                    o.x -= (o.vx || speed);
                }
                obstacles = obstacles.filter(o => o.x > -40);

                // Ранцы
                for (let b of backpacks) {
                    b.x += b.vx;
                }
                backpacks = backpacks.filter(b => b.x < W + 20);

                // Столкновения с препятствиями
                for (let o of obstacles) {
                    if (o.x < player.x + player.w && o.x + o.w > player.x &&
                        o.y < player.y + player.h && o.y + o.h > player.y) {
                        if (!o.hit) {
                            o.hit = true;
                            health--;
                            updateUI();
                            if (health <= 0) {
                                gameOver = true;
                                msgDisplay.textContent = '💀 Ты проиграл!';
                            }
                            obstacles = obstacles.filter(ob => ob !== o);
                        }
                    }
                }

                // Босс
                if (bossActive && boss && !bossDefeated) {
                    boss.attackTimer++;
                    if (boss.attackTimer >= boss.cooldown) {
                        bossAttack();
                        boss.attackTimer = 0;
                    }
                    // Попадания ранцев
                    for (let b of backpacks) {
                        if (b.x > boss.x && b.x < boss.x + boss.w &&
                            b.y > boss.y && b.y < boss.y + boss.h) {
                            bossHealth--;
                            backpacks = backpacks.filter(bb => bb !== b);
                            if (bossHealth <= 0) {
                                bossDefeated = true;
                                bossActive = false;
                                score += 20;
                                updateUI();
                                msgDisplay.textContent = '🎉 Босс побежден! +20🍊';
                                setTimeout(() => {
                                    msgDisplay.textContent = 'Продолжай бежать!';
                                }, 2000);
                            }
                        }
                    }
                }

                // Спавн
                if (!bossActive && !bossSpawned) {
                    if (frame % 60 === 0) spawnCoin();
                    if (frame % 80 === 0) spawnObstacle();
                } else if (bossActive && !bossDefeated) {
                    // Во время босса — ничего не спавним
                }

                // Появление босса после 100 очков
                if (score >= 100 && !bossSpawned) {
                    spawnBoss();
                }

                // Победа после 150 очков и победы над боссом
                if (score >= 150 && bossDefeated && !gameWin) {
                    gameWin = true;
                    msgDisplay.textContent = '🏆 Ты победил!';
                }

                // Счёт
                if (frame % 30 === 0 && !gameOver && !gameWin) {
                    score++;
                    updateUI();
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                // Фон
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#1a1a3a');
                grad.addColorStop(0.6, '#2a2a4a');
                grad.addColorStop(1, '#0a0a1a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Земля
                ctx.fillStyle = '#4a4a4a';
                ctx.fillRect(0, GROUND, W, H - GROUND);

                // Монеты
                for (let c of coins) {
                    ctx.fillStyle = '#ffcc00';
                    ctx.beginPath();
                    ctx.arc(c.x + c.w / 2, c.y + c.h / 2, 6, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Препятствия
                for (let o of obstacles) {
                    if (o.isBoss) {
                        ctx.fillStyle = '#ff4444';
                    } else if (o.type === 'burger') {
                        ctx.fillStyle = '#d4a373';
                    } else {
                        ctx.fillStyle = '#8B4513';
                    }
                    ctx.fillRect(o.x, o.y, o.w, o.h);
                }

                // Ранцы
                for (let b of backpacks) {
                    ctx.fillStyle = '#2a9d8f';
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }

                // Босс
                if (bossActive && boss && !bossDefeated) {
                    ctx.fillStyle = '#2b2b2b';
                    ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText('T-2 X-2', boss.x + 5, boss.y + 15);
                    // HP
                    ctx.fillStyle = '#333';
                    ctx.fillRect(boss.x, boss.y - 10, boss.w, 6);
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillRect(boss.x, boss.y - 10, boss.w * (bossHealth / 5), 6);
                }

                // Игрок
                ctx.fillStyle = '#8B5A2B';
                ctx.fillRect(player.x, player.y, player.w, player.h);
                ctx.fillStyle = '#5C3A1E';
                ctx.fillRect(player.x + 4, player.y - 6, 22, 8);

                // UI
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ff4444';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('GAME OVER', W / 2, H / 2);
                }
                if (gameWin) {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffcc00';
                    ctx.font = 'bold 24px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('🎉 ПОБЕДА!', W / 2, H / 2);
                }
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }

            // События
            canvas.addEventListener('click', (e) => {
                e.preventDefault();
                jump();
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                jump();
            });
            canvas.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                shoot();
            });

            restartBtn.addEventListener('click', reset);
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    jump();
                }
                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    shoot();
                }
            });

            reset();
            loop();
        })();
    </script>
</body>
</html>
