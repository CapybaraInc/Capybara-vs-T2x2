<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Capybara-vs-T2x2</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0a1a; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Segoe UI', sans-serif; padding:10px; }
        .wrapper { max-width:420px; width:100%; background:#0a0a1a; border-radius:24px; padding:15px; box-shadow:0 0 60px #ff00ff44; border:1px solid #ff00ff44; }
        canvas { display:block; width:100%; aspect-ratio:9/16; background:#0a0a1a; border-radius:16px; touch-action:none; }
        .ui { display:flex; justify-content:space-between; align-items:center; color:#fff; padding:10px 5px 0; font-weight:bold; }
        .ui .score { color:#ffcc00; text-shadow:0 0 10px #ffcc00; }
        .ui .health { color:#ff6666; text-shadow:0 0 10px #ff6666; }
        .controls { display:flex; justify-content:center; gap:10px; margin-top:10px; }
        .controls button { background:#222; border:2px solid #ff00ff; color:#fff; padding:10px 20px; border-radius:30px; font-weight:bold; cursor:pointer; }
        .controls button:active { background:#ff00ff44; }
        .btn { background:#ff00ff; border:none; padding:6px 16px; border-radius:20px; color:#fff; font-weight:bold; cursor:pointer; }
        .btn:active { transform:scale(0.95); }
        .msg { text-align:center; color:#aaa; font-size:0.8rem; margin-top:5px; }
    </style>
</head>
<body>
<div class="wrapper">
    <canvas id="gameCanvas"></canvas>
    <div class="ui">
        <span class="score">🍊 <span id="scoreDisplay">0</span></span>
        <span class="health">❤️ <span id="healthDisplay">3</span></span>
        <button class="btn" id="restartBtn">↺</button>
    </div>
    <div class="controls">
        <button id="jumpBtn">⬆ Прыжок</button>
        <button id="shootBtn">🎒 Стрельба</button>
    </div>
    <div class="msg" id="msgDisplay">Беги и собирай апельсинки!</div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const healthDisplay = document.getElementById('healthDisplay');
        const msgDisplay = document.getElementById('msgDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const jumpBtn = document.getElementById('jumpBtn');
        const shootBtn = document.getElementById('shootBtn');

        const W = canvas.width;
        const H = canvas.height;

        function resize() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * (window.devicePixelRatio || 1);
            canvas.height = rect.height * (window.devicePixelRatio || 1);
            ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
        }
        resize();
        window.addEventListener('resize', resize);

        // ===== ЗВУКИ =====
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playTone(freq, duration, type='square', vol=0.1) {
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        // ===== ФОТО =====
        const bossStand = new Image();
        const bossHit = new Image();
        bossStand.src = 'boss-stand.png';
        bossHit.src = 'boss-hit.png';

        // ===== СОСТОЯНИЕ =====
        let score = 0;
        let health = 3;
        let gameOver = false;
        let gameWin = false;
        let bossActive = false;
        let bossDefeated = false;
        let bossHealth = 5;
        let bossSpawned = false;
        let frame = 0;
        let speed = 4;
        let lane = 1;
        let hitEffect = 0;
        let bossHitEffect = 0;

        const GROUND = H - 60;
        const LANE_W = 60;
        const LANES = [-LANE_W, 0, LANE_W];

        let player = {
            x: 50 + LANES[1],
            y: H - 80,
            w: 25,
            h: 30,
            vy: 0,
            grounded: true
        };

        let obstacles = [];
        let coins = [];
        let wings = [];
        let backpacks = [];
        let boss = null;

        // ===== СБРОС =====
        function reset() {
            score = 0;
            health = 3;
            gameOver = false;
            gameWin = false;
            bossActive = false;
            bossDefeated = false;
            bossHealth = 5;
            bossSpawned = false;
            frame = 0;
            speed = 4;
            lane = 1;
            hitEffect = 0;
            bossHitEffect = 0;
            player.x = 50 + LANES[1];
            player.y = H - 80;
            player.vy = 0;
            player.grounded = true;
            obstacles = [];
            coins = [];
            wings = [];
            backpacks = [];
            boss = null;
            msgDisplay.textContent = 'Беги и собирай апельсинки!';
            updateUI();
        }

        function updateUI() {
            scoreDisplay.textContent = score;
            healthDisplay.textContent = health;
        }

        // ===== УПРАВЛЕНИЕ =====
        function jump() {
            if (gameOver || gameWin) return;
            if (player.grounded) {
                player.vy = -7;
                player.grounded = false;
                playTone(400, 0.1, 'sine', 0.08);
            }
        }

        function shoot() {
            if (gameOver || gameWin) return;
            if (!bossActive || bossDefeated) return;
            backpacks.push({
                x: player.x + 15,
                y: player.y + 10,
                w: 12,
                h: 10,
                vx: 5
            });
            playTone(800, 0.05, 'square', 0.05);
        }

        function switchLane(dir) {
            if (gameOver || gameWin) return;
            const newLane = lane + dir;
            if (newLane < 0 || newLane > 2) return;
            lane = newLane;
            player.x = 50 + LANES[lane];
        }

        // ===== СПАВН =====
        function spawnCoin() {
            const l = Math.floor(Math.random() * 3);
            coins.push({
                x: 50 + LANES[l],
                y: 20,
                w: 10,
                h: 10,
                collected: false
            });
        }

        function spawnObstacle() {
            const l = Math.floor(Math.random() * 3);
            obstacles.push({
                x: 50 + LANES[l],
                y: 20,
                w: 25,
                h: 25,
                hit: false
            });
        }

        function spawnWing() {
            if (!bossActive || bossDefeated) return;
            const l = Math.floor(Math.random() * 3);
            wings.push({
                x: 50 + LANES[l],
                y: 20,
                w: 15,
                h: 10,
                vx: -3 - Math.random() * 2
            });
        }

        function spawnBoss() {
            boss = {
                x: 50 + LANES[1],
                y: 20,
                w: 70,
                h: 90,
                attackTimer: 0,
                cooldown: 50,
                phraseTimer: 0
            };
            bossActive = true;
            bossSpawned = true;
            msgDisplay.textContent = '⚡ T-2 X-2 появился!';
            obstacles = [];
            coins = [];
            playTone(200, 0.3, 'sawtooth', 0.15);
        }

        // ===== ОБНОВЛЕНИЕ =====
        function update() {
            if (gameOver || gameWin) return;
            frame++;

            // Физика игрока
            player.vy += 0.4;
            player.y += player.vy;
            if (player.y >= GROUND - player.h) {
                player.y = GROUND - player.h;
                player.vy = 0;
                player.grounded = true;
            }

            // Движение объектов вниз
            for (let c of coins) { c.y += speed; }
            for (let o of obstacles) { o.y += speed; }
            for (let w of wings) { w.y += speed; }

            // Монеты
            for (let c of coins) {
                if (!c.collected) {
                    if (player.x + player.w > c.x && player.x < c.x + c.w &&
                        player.y + player.h > c.y && player.y < c.y + c.h) {
                        c.collected = true;
                        score += 5;
                        updateUI();
                        playTone(880, 0.08, 'sine', 0.08);
                    }
                }
            }
            coins = coins.filter(c => !c.collected && c.y < H + 20);

            // Препятствия
            for (let o of obstacles) {
                if (!o.hit) {
                    if (player.x + player.w > o.x && player.x < o.x + o.w &&
                        player.y + player.h > o.y && player.y < o.y + o.h) {
                        health--;
                        updateUI();
                        o.hit = true;
                        playTone(200, 0.2, 'sawtooth', 0.1);
                        if (health <= 0) {
                            gameOver = true;
                            msgDisplay.textContent = '💀 Ты проиграл!';
                        }
                    }
                }
            }
            obstacles = obstacles.filter(o => o.y < H + 20);

            // Крылышки
            for (let w of wings) {
                if (w.x + w.w > player.x && w.x < player.x + player.w &&
                    w.y + w.h > player.y && w.y < player.y + player.h) {
                    health--;
                    updateUI();
                    playTone(200, 0.2, 'sawtooth', 0.1);
                    wings = wings.filter(wi => wi !== w);
                    if (health <= 0) {
                        gameOver = true;
                        msgDisplay.textContent = '💀 Ты проиграл!';
                    }
                }
            }
            wings = wings.filter(w => w.y < H + 20);

            // Ранцы
            for (let b of backpacks) {
                b.x += b.vx;
            }
            backpacks = backpacks.filter(b => b.x < W + 20);

            // Босс
            if (bossActive && boss && !bossDefeated) {
                boss.attackTimer++;
                if (boss.attackTimer >= boss.cooldown) {
                    spawnWing();
                    boss.attackTimer = 0;
                }
                // Попадания ранцев
                for (let b of backpacks) {
                    if (b.x > boss.x && b.x < boss.x + boss.w &&
                        b.y > boss.y && b.y < boss.y + boss.h) {
                        bossHealth--;
                        backpacks = backpacks.filter(bb => bb !== b);
                        bossHitEffect = 15;
                        playTone(1000, 0.1, 'sine', 0.15);
                        if (bossHealth <= 0) {
                            bossDefeated = true;
                            bossActive = false;
                            score += 20;
                            updateUI();
                            msgDisplay.textContent = '🎉 Босс побежден! +20🍊';
                            playTone(1200, 0.2, 'sine', 0.2);
                            setTimeout(() => {
                                msgDisplay.textContent = 'Продолжай бежать!';
                            }, 2000);
                        }
                    }
                }
            }

            // Спавн
            if (!bossActive && !bossSpawned) {
                if (frame % 60 === 0) spawnCoin();
                if (frame % 70 === 0) spawnObstacle();
            } else if (bossActive && !bossDefeated) {
                // Во время босса — только крылышки
            }

            // Появление босса после 100 очков
            if (score >= 100 && !bossSpawned) {
                spawnBoss();
            }

            // Победа после 150 очков и победы над боссом
            if (score >= 150 && bossDefeated && !gameWin) {
                gameWin = true;
                msgDisplay.textContent = '🏆 Ты победил!';
                playTone(523, 0.15, 'sine', 0.15);
                setTimeout(() => playTone(659, 0.15, 'sine', 0.15), 150);
                setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 300);
            }

            // Счёт
            if (frame % 30 === 0 && !gameOver && !gameWin) {
                score++;
                updateUI();
            }

            // Эффекты
            if (bossHitEffect > 0) bossHitEffect--;
            if (hitEffect > 0) hitEffect--;
        }

        // ===== ОТРИСОВКА =====
        function draw() {
            ctx.clearRect(0, 0, W, H);

            // Фон
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#1a1a3a');
            grad.addColorStop(0.6, '#2a2a4a');
            grad.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Дорожки
            ctx.fillStyle = '#3a3a4a';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(20 + i * LANE_W * 2 + LANE_W / 2 - 1, 0, 2, H);
            }

            // Монеты
            for (let c of coins) {
                ctx.fillStyle = '#ffcc00';
                ctx.shadowColor = '#ffcc00';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(c.x + c.w / 2, c.y + c.h / 2, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            // Препятствия
            for (let o of obstacles) {
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.fillStyle = '#D2B48C';
                ctx.fillRect(o.x + 2, o.y + 2, o.w - 4, o.h - 4);
            }

            // Крылышки
            for (let w of wings) {
                ctx.fillStyle = '#d4a373';
                ctx.fillRect(w.x, w.y, w.w, w.h);
                ctx.fillStyle = '#f4a261';
                ctx.fillRect(w.x, w.y - 2, w.w, 4);
            }

            // Ранцы
            for (let b of backpacks) {
                ctx.fillStyle = '#2a9d8f';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = '#e9c46a';
                ctx.fillRect(b.x + 4, b.y - 2, 8, 4);
            }

            // Босс (фото с ведром KFC)
            if (bossActive && boss && !bossDefeated) {
                ctx.drawImage(bossStand, boss.x, boss.y, boss.w, boss.h);
                // HP
                ctx.fillStyle = '#333';
                ctx.fillRect(boss.x, boss.y - 10, boss.w, 5);
                ctx.fillStyle = '#ffcc00';
                ctx.fillRect(boss.x, boss.y - 10, boss.w * (bossHealth / 5), 5);
            }

            // Кричащее лицо
            if (bossHitEffect > 0) {
                const alpha = bossHitEffect / 15;
                ctx.globalAlpha = alpha;
                ctx.drawImage(bossHit, 0, 0, W, H);
                ctx.globalAlpha = 1;
            }

            // Игрок
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(player.x, player.y, player.w, player.h);
            ctx.fillStyle = '#5C3A1E';
            ctx.fillRect(player.x + 4, player.y - 4, 18, 6);

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, H / 2);
            }
            if (gameWin) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('🎉 ПОБЕДА!', W / 2, H / 2);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // ===== УПРАВЛЕНИЕ =====
        jumpBtn.addEventListener('click', jump);
        shootBtn.addEventListener('click', shoot);
        canvas.addEventListener('click', (e) => { e.preventDefault(); jump(); });
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });
        restartBtn.addEventListener('click', reset);
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') { e.preventDefault(); jump(); }
            if (e.key === 'f' || e.key === 'F') { e.preventDefault(); shoot(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); switchLane(-1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); switchLane(1); }
        });

        reset();
        loop();
        console.log('🦫 Capybara-vs-T2x2 готова!');
    })();
</script>
</body>
</html>
